# Schema for a parsed substack post.
# Produced by Claude when ingesting a raw artifact from `substack/raw/`.
# Do not edit this file directly — copy it, then fill the fields from the
# source PDF / screenshot / clipping.
#
# OKF mapping (Open Knowledge Format v0.1): this YAML file is a structured-data
# concept in the personal knowledge OKF bundle. Its fields map to the OKF
# standard set as — source -> type, title -> title, url -> resource,
# date -> timestamp, tags -> tags. See the skill's references/OKF.md.

source: substack

# Required ----------------------------------------------------------------

# Author or publication name as it appears on the post.
author: null

# Canonical URL of the post. Use null if not present in the source.
url: null

# Article title, verbatim.
title: null

# Publication date in YYYY-MM-DD. Best-effort if only month is visible.
date: null

# Lowercase, comma-separated tickers mentioned anywhere in the body.
# Example: "nvda,amd,avgo"
tickers: null

# Full article body as a multi-line string. Use the `|` block scalar to
# preserve paragraph breaks. Drop nav, ads, paywall stubs, footer.
body: |
  Paste the full article text here, line by line.

# Optional ----------------------------------------------------------------

# Comma-separated free-form tags. Examples: "ai-capex,supply-chain,iv-crush"
tags: null

# One-line note from the user on why this article matters.
why_saved: null

# Quotes the user found most load-bearing. Each item is a short verbatim
# excerpt (one or two sentences). Used by the model when scanning.
key_passages: []
  # - "Verbatim quote one."
  # - "Verbatim quote two."

# Description of any embedded charts / images. The model can't recall the
# images later from this YAML, so describe what they show.
media_description: null

# Cross-links to curated references or other knowledge entries.
related:
  pitfalls: []       # e.g., ["references/pitfalls/19-direction-vega-independent-axes.md"]
  case_studies: []   # e.g., ["references/ticker/cbrs-2026-05.md"]
  knowledge: []      # e.g., ["../twitter/unusual_whales-nvda-gex.yaml"]

# User's own reaction. Markdown allowed in this string.
my_take: null

# Provenance — which raw artifact this was parsed from.
raw_artifact: null   # e.g., "substack/raw/2026-05-15-anonresearch-nvda.pdf"
ingested_at: null    # YYYY-MM-DD when the parse happened
