# Schema for a parsed X / twitter post or thread.
# Produced by Claude when ingesting a raw artifact from `twitter/raw/`.
# Do not edit this file directly — copy it, then fill the fields from the
# source screenshot / PDF / clipping.
#
# OKF mapping (Open Knowledge Format v0.1): this YAML file is a structured-data
# concept in the personal knowledge OKF bundle. Its fields map to the OKF
# standard set as — source -> type, handle -> title, url -> resource,
# date -> timestamp, tags -> tags. See the skill's references/OKF.md.

source: twitter

# Required ----------------------------------------------------------------

# Handle as written, including the leading @. Example: "@unusual_whales"
handle: null

# URL of the root post (or first tweet of a thread). Use null if not visible.
url: null

# tweet | thread | reply
kind: null

# Date of the root post in YYYY-MM-DD. Best-effort from visible timestamps.
date: null

# Lowercase, comma-separated tickers mentioned anywhere in the posts.
# Example: "nvda,smci,arm"
tickers: null

# Ordered list of posts. For a single tweet, one entry. For a thread,
# preserve the original order.
posts:
  - index: 1
    text: |
      Verbatim text of the first tweet.
    timestamp: null   # ISO 8601 if visible, else null
    metrics:
      replies: null
      retweets: null
      likes: null
      views: null

# Optional ----------------------------------------------------------------

tags: null            # comma-separated free-form tags
why_saved: null       # one-line note from the user

# Description of attached charts / screenshots / videos. The model can't
# recall the images later from this YAML, so describe what they show
# (e.g., "GEX chart — biggest positive gamma at 145 strike, 0DTE").
media_description: null

# Cross-links.
related:
  pitfalls: []         # e.g., ["references/pitfalls/02-single-flow-not-smart-money.md"]
  case_studies: []
  knowledge: []

my_take: null          # user reaction, markdown allowed in this string

# Provenance.
raw_artifact: null     # e.g., "twitter/raw/unusual_whales-nvda-gex.png"
ingested_at: null      # YYYY-MM-DD
